<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 자산 관리 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        .nav-active { border-bottom: 3px solid #2563eb; color: #2563eb; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            // 각 영역별 GAS URL (나중에 각각의 URL로 교체하세요)
            const CONFIG = {
                CASH_URL: "https://script.google.com/macros/s/AKfycbz40_5HDR17hdbiXTW1TdpHqabCYfkgSs_fuAxkFHOaAaFci3Y9Hvd_sWw1rI-0fOi9pA/exec",
                STOCK_URL: "",
                SAVINGS_URL: "",
                PENSION_URL: "",
                BOND_URL: "",
                API_KEY: "your-secret-api-key-here"
            };

            const [currentView, setCurrentView] = useState('main'); // 'main', 'cash', 'stock', 'savings', 'pension', 'bond'
            const [fetching, setFetching] = useState(true);
            const [cashData, setCashData] = useState({ banks: [], categories: [], recentLogs: [] });
            
            // 임시 데이터 (나중에 각 백엔드 연결 시 실제 데이터로 대체)
            const [mockTotals, setMockTotals] = useState({
                stock: 15000000,
                savings: 25000000,
                pension: 8500000,
                bond: 5000000
            });

            const [cashForm, setCashForm] = useState({ bank: '', category: '', amount: '', memo: '' });
            const [loading, setLoading] = useState(false);

            // 입출금 데이터 가져오기
            const fetchCashData = async () => {
                if (!CONFIG.CASH_URL) return;
                setFetching(true);
                try {
                    const response = await fetch(`${CONFIG.CASH_URL}?key=${CONFIG.API_KEY}`);
                    const result = await response.json();
                    if (result.status !== 'error') setCashData(result);
                } catch (error) {
                    console.error("Cash data fetch error:", error);
                } finally {
                    setFetching(false);
                }
            };

            useEffect(() => {
                fetchCashData();
            }, []);

            // 총 자산 계산
            const assetStats = useMemo(() => {
                const cashTotal = cashData.recentLogs.reduce((acc, curr) => acc + Number(curr.amount || 0), 0);
                const total = cashTotal + mockTotals.stock + mockTotals.savings + mockTotals.pension + mockTotals.bond;
                return {
                    total,
                    cash: cashTotal,
                    stock: mockTotals.stock,
                    savings: mockTotals.savings,
                    pension: mockTotals.pension,
                    bond: mockTotals.bond
                };
            }, [cashData, mockTotals]);

            const handleCashSubmit = async (e) => {
                e.preventDefault();
                if (!cashForm.bank || !cashForm.category || !cashForm.amount) return;
                setLoading(true);
                try {
                    await fetch(CONFIG.CASH_URL + `?key=${CONFIG.API_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'add', ...cashForm }),
                    });
                    setCashForm({ bank: '', category: '', amount: '', memo: '' });
                    await fetchCashData();
                } catch (error) {
                    alert("오류가 발생했습니다.");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [currentView, fetching, cashData]);

            // 메뉴 구성
            const menuItems = [
                { id: 'main', label: '대시보드', icon: 'layout-grid' },
                { id: 'cash', label: '입출금', icon: 'wallet' },
                { id: 'stock', label: '주식투자', icon: 'trending-up' },
                { id: 'savings', label: '예적금', icon: 'piggy-bank' },
                { id: 'pension', label: '연금저축', icon: 'coins' },
                { id: 'bond', label: '국채', icon: 'file-text' },
            ];

            return (
                <div className="min-h-screen pb-20 md:pb-0">
                    {/* Navigation */}
                    <nav className="bg-white border-b border-slate-200 sticky top-0 z-50 overflow-x-auto hide-scrollbar">
                        <div className="max-w-5xl mx-auto px-4 flex items-center justify-between h-16 gap-8">
                            <div className="flex items-center gap-2 font-black text-blue-600 text-xl flex-shrink-0">
                                <i data-lucide="shield-check"></i>
                                <span>ASSET Management</span>
                            </div>
                            <div className="flex gap-4 md:gap-8 h-full flex-shrink-0">
                                {menuItems.map(item => (
                                    <button 
                                        key={item.id}
                                        onClick={() => setCurrentView(item.id)}
                                        className={`px-1 flex items-center gap-1.5 text-sm font-bold transition-all whitespace-nowrap ${currentView === item.id ? 'nav-active' : 'text-slate-400 hover:text-slate-600'}`}
                                    >
                                        <i data-lucide={item.icon} className="w-4 h-4"></i>
                                        {item.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    <main className="p-4 md:p-8 max-w-5xl mx-auto">
                        
                        {/* 1. MAIN DASHBOARD VIEW */}
                        {currentView === 'main' && (
                            <div className="space-y-6">
                                {/* Total Assets Header */}
                                <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-8 text-white shadow-xl shadow-blue-200">
                                    <p className="text-blue-100 text-sm font-medium mb-1">나의 모든 자산 합계</p>
                                    <h2 className="text-4xl font-black mb-6 tracking-tight">
                                        {assetStats.total.toLocaleString()}원
                                    </h2>
                                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4 pt-6 border-t border-white/20">
                                        <div>
                                            <p className="text-blue-200 text-xs mb-1">입출금</p>
                                            <p className="font-bold">{assetStats.cash.toLocaleString()}원</p>
                                        </div>
                                        <div>
                                            <p className="text-blue-200 text-xs mb-1">주식투자</p>
                                            <p className="font-bold">{assetStats.stock.toLocaleString()}원</p>
                                        </div>
                                        <div>
                                            <p className="text-blue-200 text-xs mb-1">예적금</p>
                                            <p className="font-bold">{assetStats.savings.toLocaleString()}원</p>
                                        </div>
                                        <div>
                                            <p className="text-blue-200 text-xs mb-1">연금저축</p>
                                            <p className="font-bold">{assetStats.pension.toLocaleString()}원</p>
                                        </div>
                                        <div>
                                            <p className="text-blue-200 text-xs mb-1">국채</p>
                                            <p className="font-bold">{assetStats.bond.toLocaleString()}원</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Asset Breakdown Cards */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center">
                                                <i data-lucide="bar-chart-3"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-slate-800">투자 비중</h3>
                                                <p className="text-sm text-slate-500">주식/채권 비중 72%</p>
                                            </div>
                                        </div>
                                        <i data-lucide="chevron-right" className="text-slate-300"></i>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center">
                                                <i data-lucide="zap"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-slate-800">최근 업데이트</h3>
                                                <p className="text-sm text-slate-500">방금 전 입출금 내역 갱신</p>
                                            </div>
                                        </div>
                                        <i data-lucide="chevron-right" className="text-slate-300"></i>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 2. CASH VIEW (Existing logic) */}
                        {currentView === 'cash' && (
                            <div className="space-y-6">
                                <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                                        <i data-lucide="plus-circle" className="text-blue-500"></i>내역 기록
                                    </h2>
                                    <form onSubmit={handleCashSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase">금융사</label>
                                            <input list="bank-list" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="예: 신한은행" value={cashForm.bank} onChange={e => setCashForm({...cashForm, bank: e.target.value})} />
                                            <datalist id="bank-list">{cashData.banks.map((b, i) => <option key={i} value={b} />)}</datalist>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase">종류</label>
                                            <input list="cat-list" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="예: 급여" value={cashForm.category} onChange={e => setCashForm({...cashForm, category: e.target.value})} />
                                            <datalist id="cat-list">{cashData.categories.map((c, i) => <option key={i} value={c} />)}</datalist>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase">금액</label>
                                            <input type="number" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="0" value={cashForm.amount} onChange={e => setCashForm({...cashForm, amount: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase">비고</label>
                                            <input className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="메모" value={cashForm.memo} onChange={e => setCashForm({...cashForm, memo: e.target.value})} />
                                        </div>
                                        <button type="submit" disabled={loading} className="md:col-span-2 bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all disabled:opacity-50">
                                            {loading ? "저장 중..." : "기록 저장하기"}
                                        </button>
                                    </form>
                                </section>

                                <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                        <h2 className="text-lg font-bold">최근 입출금 내역</h2>
                                        <button onClick={fetchCashData} className="p-2 hover:bg-slate-100 rounded-full transition-all text-slate-400">
                                            <i data-lucide="refresh-cw" className={`w-4 h-4 ${fetching ? 'animate-spin' : ''}`}></i>
                                        </button>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 text-slate-400 font-bold text-xs uppercase">
                                                <tr><th className="px-6 py-4">금융사</th><th className="px-6 py-4">항목</th><th className="px-6 py-4 text-right">금액</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {cashData.recentLogs.map(log => (
                                                    <tr key={log.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="px-6 py-4 font-bold">{log.bank}</td>
                                                        <td className="px-6 py-4 text-slate-500">{log.category}</td>
                                                        <td className="px-6 py-4 text-right font-black text-blue-600">{Number(log.amount).toLocaleString()}원</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            </div>
                        )}

                        {/* 3~6. OTHER VIEWS (Placeholders) */}
                        {['stock', 'savings', 'pension', 'bond'].includes(currentView) && (
                            <div className="bg-white p-20 rounded-3xl border border-slate-200 text-center space-y-4 shadow-sm">
                                <div className="w-20 h-20 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i data-lucide={menuItems.find(m => m.id === currentView).icon} className="w-10 h-10"></i>
                                </div>
                                <h2 className="text-2xl font-black text-slate-800 tracking-tight">
                                    {menuItems.find(m => m.id === currentView).label} 영역 준비 중
                                </h2>
                                <p className="text-slate-500 max-w-xs mx-auto">해당 기능은 현재 개발 중입니다. 곧 백엔드 연동과 함께 업데이트될 예정입니다.</p>
                                <button onClick={() => setCurrentView('main')} className="mt-6 text-blue-600 font-bold flex items-center gap-2 mx-auto hover:underline">
                                    <i data-lucide="arrow-left" className="w-4 h-4"></i> 대시보드로 돌아가기
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
