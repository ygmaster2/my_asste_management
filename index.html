<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Management</title>
    
    <!-- PWA 관련 설정 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2454/2454282.png">

    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide 아이콘 라이브러리 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
        }
        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .transition-theme {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        /* 스크롤바 숨기기 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .chart-bar { transition: height 0.5s ease-out; }
    </style>
</head>
<body class="transition-theme">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        attrs: {
                            width: size,
                            height: size,
                            class: className,
                            'stroke-width': 2
                        },
                        icons: {
                            [name]: window.lucide.icons[name]
                        }
                    });
                }
            }, [name, size, className]);

            return <i data-lucide={name} ref={iconRef} className={className} style={{ width: size, height: size, display: 'inline-flex' }}></i>;
        };

        // 구글 앱스 스크립트 배포 URL
        const API_URL = "https://script.google.com/macros/s/AKfycbzar_WcHBnRlZyQDxrGkjnVTJKNhLupbdYUAWnuIGISb1TN-KYQTrMJiAgHclz6jnqQMg/exec";

        const SHEET_CONFIG = {
            "입출금": ["날짜", "금융사", "종류", "금액", "비고"],
            "주식투자": ["날짜", "증권사", "종목명", "매입금액", "현재가", "보유수량", "평가손익", "비고"],
            "예적금": ["날짜", "상품명", "은행", "금액", "비고"],
            "연금저축펀드": ["날짜", "증권사", "종목명", "매입금액", "현재가", "보유수량", "평가손익", "비고"],
            "개인투자용국채": ["날짜", "증권사", "매입금액", "비고"]
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('Dashboard');
            const [data, setData] = useState({
                "입출금": [], "주식투자": [], "예적금": [], "연금저축펀드": [], "개인투자용국채": []
            });
            const [loading, setLoading] = useState(false);
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            
            const [editingItem, setEditingItem] = useState(null); 
            const [editForm, setEditForm] = useState({});

            const fetchData = async () => {
                if (!API_URL) return;
                setLoading(true);
                try {
                    const response = await fetch(API_URL);
                    const json = await response.json();
                    setData(json);
                } catch (error) {
                    console.error("데이터 로드 실패:", error);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
                
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        navigator.serviceWorker.register('./sw.js').then(reg => {
                            console.log('Service Worker registered');
                        }).catch(err => {
                            console.log('Service Worker registration failed: ', err);
                        });
                    });
                }

                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    setIsDarkMode(true);
                }
                
                const handler = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };

                window.addEventListener('beforeinstallprompt', handler);
                window.addEventListener('appinstalled', () => {
                    setDeferredPrompt(null);
                });

                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDarkMode]);

            const handleInstall = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    setDeferredPrompt(null);
                }
            };

            const stats = useMemo(() => {
                const getSum = (arr, key) => (arr || []).reduce((sum, item) => sum + (Number(item[key]) || 0), 0);
                const getEvalSum = (arr) => (arr || []).reduce((sum, item) => {
                    const buy = Number(item['매입금액']) || 0;
                    const profit = Number(item['평가손익']) || 0;
                    return sum + buy + profit;
                }, 0);

                const totals = {
                    "입출금": getSum(data["입출금"], "금액"),
                    "주식투자": getEvalSum(data["주식투자"]),
                    "예적금": getSum(data["예적금"], "금액"),
                    "연금저축펀드": getEvalSum(data["연금저축펀드"]),
                    "개인투자용국채": getSum(data["개인투자용국채"], "매입금액")
                };

                const stockInvestSum = getSum(data["주식투자"], "매입금액");
                const stockProfitSum = getSum(data["주식투자"], "평가손익");
                const stockYield = stockInvestSum > 0 ? (stockProfitSum / stockInvestSum) * 100 : 0;

                const pensionInvestSum = getSum(data["연금저축펀드"], "매입금액");
                const pensionProfitSum = getSum(data["연금저축펀드"], "평가손익");
                const pensionYield = pensionInvestSum > 0 ? (pensionProfitSum / pensionInvestSum) * 100 : 0;

                const grandTotal = Object.values(totals).reduce((a, b) => a + b, 0);
                return { totals, grandTotal, stockInvestSum, stockProfitSum, stockYield, pensionInvestSum, pensionProfitSum, pensionYield };
            }, [data]);

            const menuItems = [
                { id: 'Dashboard', label: '대시보드', icon: 'LayoutDashboard' },
                { id: '입출금', label: '입출금', icon: 'Wallet' },
                { id: '주식투자', label: '주식투자', icon: 'TrendingUp' },
                { id: '예적금', label: '예적금', icon: 'PiggyBank' },
                { id: '연금저축펀드', label: '연금저축펀드', icon: 'PieChart' },
                { id: '개인투자용국채', label: '개인투자용국채', icon: 'ScrollText' },
            ];

            const formatKRW = (val) => new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(val);

            const getAssetIcon = (id) => {
                const item = menuItems.find(m => m.id === id);
                return item ? item.icon : 'RefreshCcw';
            };

            const openEditModal = (title, row = null, index = null) => {
                if (row === null) {
                    const emptyForm = {};
                    SHEET_CONFIG[title].forEach(field => {
                        emptyForm[field] = field === '날짜' ? new Date().toISOString().split('T')[0] : '';
                    });
                    setEditingItem({ title, index: null, isNew: true });
                    setEditForm(emptyForm);
                } else {
                    setEditingItem({ title, index, isNew: false });
                    setEditForm({ ...row });
                }
            };

            const handleSaveEdit = async () => {
                if (loading) return;
                const { title, index, isNew } = editingItem;
                
                const originalData = JSON.parse(JSON.stringify(data));
                
                // 낙관적 업데이트: 화면에 즉시 반영
                const newData = { ...data };
                if (isNew) {
                    // 추가의 경우 맨 앞에 데이터 삽입 (GAS reverse 대응)
                    newData[title] = [editForm, ...newData[title]];
                } else {
                    // 수정의 경우 해당 인덱스 교체
                    newData[title] = [...newData[title]];
                    newData[title][index] = editForm;
                }
                
                setData(newData);
                setLoading(true);
                setEditingItem(null);

                try {
                    // GAS에서 .reverse()를 해서 보내주므로, 수정 시 인덱스 보정
                    const actualIndex = isNew ? null : (originalData[title].length - 1 - index);

                    const payload = {
                        action: isNew ? 'append' : 'update',
                        sheetName: title,
                        data: editForm,
                        rowIndex: actualIndex 
                    };

                    await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        cache: 'no-cache',
                        body: JSON.stringify(payload)
                    });

                    // 서버 반영 대기 후 동기화
                    setTimeout(fetchData, 2000);
                } catch (error) {
                    console.error("저장 중 오류 발생:", error);
                    setData(originalData); // 실패 시 복구
                    alert("데이터 저장 중 오류가 발생했습니다.");
                    setLoading(false);
                }
            };

            const handleDelete = async (title, index) => {
                if (confirm('정말로 이 항목을 삭제하시겠습니까?')) {
                    const originalData = JSON.parse(JSON.stringify(data));
                    
                    // 낙관적 업데이트: 화면에서 즉시 제거
                    const newData = { ...data };
                    newData[title] = newData[title].filter((_, i) => i !== index);
                    setData(newData);
                    
                    setLoading(true);

                    try {
                        // GAS에서 .reverse()를 해서 보내주므로, 시트의 실제 위치 보정
                        const actualIndex = originalData[title].length - 1 - index;

                        const payload = {
                            action: 'delete',
                            sheetName: title,
                            rowIndex: actualIndex
                        };

                        await fetch(API_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            cache: 'no-cache',
                            body: JSON.stringify(payload)
                        });

                        // 삭제 완료 후 데이터 최종 정합성을 위해 재동기화
                        setTimeout(fetchData, 2000);
                    } catch (error) {
                        console.error("삭제 요청 실패:", error);
                        setData(originalData); // 실패 시 데이터 복구
                        alert("서버 통신 오류로 삭제에 실패했습니다.");
                        setLoading(false);
                    }
                }
            };

            const assetColors = {
                "입출금": "#2563eb",
                "주식투자": "#f59e0b",
                "예적금": "#10b981",
                "연금저축펀드": "#8b5cf6",
                "개인투자용국채": "#ef4444"
            };

            const renderDetailView = (title) => {
                const list = data[title] || [];
                const headers = SHEET_CONFIG[title] || [];
                const total = stats.totals[title];
                const iconName = getAssetIcon(title);

                const isInvestmentType = title === '주식투자' || title === '연금저축펀드';
                const investSum = title === '주식투자' ? stats.stockInvestSum : stats.pensionInvestSum;
                const profitSum = title === '주식투자' ? stats.stockProfitSum : stats.pensionProfitSum;
                const yieldVal = title === '주식투자' ? stats.stockYield : stats.pensionYield;

                return (
                    <div className="space-y-6 animate-in">
                        <header className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 flex flex-col lg:flex-row lg:items-center justify-between gap-6 transition-theme">
                            <div className="flex flex-col md:flex-row md:items-center gap-6 flex-1">
                                <div className="flex items-center gap-5">
                                    <div className="w-14 h-14 rounded-2xl bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center shrink-0">
                                        <Icon name={iconName} size={28} />
                                    </div>
                                    <div>
                                        <h2 className="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider">{title} 자산 총액</h2>
                                        <p className="text-3xl font-bold text-slate-800 dark:text-slate-100 mt-1">{formatKRW(total)}</p>
                                    </div>
                                </div>
                                
                                {isInvestmentType && (
                                    <div className="flex flex-wrap gap-4 md:border-l md:border-slate-100 dark:md:border-slate-700 md:pl-6">
                                        <div>
                                            <span className="text-[10px] font-bold text-slate-400 uppercase">투자 금액</span>
                                            <p className="text-sm font-semibold text-slate-600 dark:text-slate-300">{formatKRW(investSum)}</p>
                                        </div>
                                        <div>
                                            <span className="text-[10px] font-bold text-slate-400 uppercase">수익 금액</span>
                                            <p className={`text-sm font-semibold ${profitSum >= 0 ? 'text-rose-500' : 'text-blue-500'}`}>
                                                {profitSum >= 0 ? '+' : ''}{profitSum.toLocaleString()}
                                            </p>
                                        </div>
                                        <div>
                                            <span className="text-[10px] font-bold text-slate-400 uppercase">수익률</span>
                                            <p className={`text-sm font-semibold ${yieldVal >= 0 ? 'text-rose-500' : 'text-blue-500'}`}>
                                                {yieldVal >= 0 ? '+' : ''}{yieldVal.toFixed(2)}%
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                            
                            <button 
                                onClick={() => openEditModal(title)}
                                className="flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-all shadow-lg shadow-blue-100 dark:shadow-none shrink-0"
                            >
                                <Icon name="Plus" size={18} /> 항목 추가하기
                            </button>
                        </header>

                        <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden transition-theme">
                            <div className="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                                <h3 className="font-semibold text-slate-700 dark:text-slate-200 flex items-center gap-2">
                                    <Icon name="List" size={16} className="text-slate-400" /> 상세 내역
                                </h3>
                                <span className="text-xs font-bold text-slate-400 bg-slate-50 dark:bg-slate-700 px-2 py-1 rounded-md">{list.length}건</span>
                            </div>
                            <div className="overflow-x-auto hide-scrollbar">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-50 dark:bg-slate-700/50 text-slate-500 dark:text-slate-400 font-medium">
                                        <tr>
                                            {headers.map(header => (
                                                <th key={header} className="p-4 whitespace-nowrap text-[11px] uppercase tracking-wider">{header}</th>
                                            ))}
                                            <th className="p-4 text-[11px] uppercase tracking-wider text-center">관리</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50 dark:divide-slate-700">
                                        {list.map((row, i) => (
                                            <tr key={i} className="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors">
                                                {headers.map((header) => (
                                                    <td key={header} className="p-4 text-slate-600 dark:text-slate-300 whitespace-nowrap">
                                                        <div className="flex items-center gap-2">
                                                            {header === '날짜' && <Icon name="Calendar" size={12} className="text-slate-300" />}
                                                            {typeof row[header] === 'number' 
                                                                ? row[header].toLocaleString() 
                                                                : (row[header] ? String(row[header]) : '-')}
                                                        </div>
                                                    </td>
                                                ))}
                                                <td className="p-4 whitespace-nowrap">
                                                    <div className="flex items-center justify-center gap-2">
                                                        <button 
                                                            onClick={() => openEditModal(title, row, i)}
                                                            className="p-1.5 text-slate-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 rounded-md transition-all"
                                                            title="수정"
                                                        >
                                                            <Icon name="Pencil" size={14} />
                                                        </button>
                                                        <button 
                                                            onClick={() => handleDelete(title, i)}
                                                            className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-md transition-all"
                                                            title="삭제"
                                                        >
                                                            <Icon name="Trash2" size={14} />
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            const getChartGradient = () => {
                if (stats.grandTotal === 0) return 'transparent';
                
                let currentPos = 0;
                const segments = Object.entries(stats.totals).map(([key, val]) => {
                    const percent = (val / stats.grandTotal) * 100;
                    if (percent === 0) return null;
                    const start = currentPos;
                    currentPos += percent;
                    return `${assetColors[key]} ${start}% ${currentPos}%`;
                }).filter(Boolean);

                return `conic-gradient(${segments.join(', ')})`;
            };

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans flex transition-theme">
                    {editingItem && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                            <div className="bg-white dark:bg-slate-800 rounded-3xl p-6 w-full max-w-md shadow-2xl border border-slate-100 dark:border-slate-700 animate-in">
                                <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                                    <Icon name={editingItem.isNew ? "PlusCircle" : "Edit3"} size={20} className="text-blue-500" /> 
                                    {editingItem.title} {editingItem.isNew ? "신규 추가" : "데이터 수정"}
                                </h3>
                                <div className="space-y-4 max-h-[60vh] overflow-y-auto pr-2 hide-scrollbar">
                                    {SHEET_CONFIG[editingItem.title].map(field => (
                                        <div key={field}>
                                            <label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">{field}</label>
                                            <input 
                                                type={field.includes('금액') || field.includes('수량') || field.includes('가') || field.includes('손익') ? 'number' : (field === '날짜' ? 'date' : 'text')}
                                                value={editForm[field] || ''}
                                                placeholder={`${field} 입력`}
                                                onChange={(e) => setEditForm({...editForm, [field]: e.target.type === 'number' ? Number(e.target.value) : e.target.value})}
                                                className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-theme"
                                            />
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-6 flex gap-3">
                                    <button onClick={() => setEditingItem(null)} className="flex-1 py-3 rounded-xl font-bold bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 hover:bg-slate-200 transition-all">취소</button>
                                    <button 
                                        onClick={handleSaveEdit} 
                                        disabled={loading}
                                        className="flex-1 py-3 rounded-xl font-bold bg-blue-600 text-white shadow-lg shadow-blue-200 dark:shadow-none hover:bg-blue-700 transition-all disabled:opacity-50"
                                    >
                                        {loading ? "처리중..." : "저장"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <aside className={`
                        fixed inset-y-0 left-0 z-50 w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transform transition-transform duration-300 ease-in-out
                        ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 transition-theme
                    `}>
                        <div className="p-6 flex items-center justify-between">
                            <h1 className="text-xl font-bold text-blue-600 flex items-center gap-2">
                                <Icon name="TrendingUp" size={24} /> Asset Management
                            </h1>
                            <button onClick={() => setSidebarOpen(false)} className="md:hidden text-slate-400"><Icon name="X" /></button>
                        </div>
                        <nav className="mt-4 px-3 space-y-1">
                            {menuItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => { setActiveTab(item.id); setSidebarOpen(false); }}
                                    className={`
                                        w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all
                                        ${activeTab === item.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800'}
                                    `}
                                >
                                    <Icon name={item.icon} size={18} />
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    <main className="flex-1 md:ml-64 p-4 md:p-8 min-w-0 pb-24 transition-theme">
                        <div className="flex items-center justify-between mb-8">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setSidebarOpen(true)} className="md:hidden p-2 bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700">
                                    <Icon name="Menu" size={20} />
                                </button>
                            </div>
                            <div className="flex items-center gap-3">
                                {deferredPrompt && (
                                    <button 
                                        onClick={handleInstall}
                                        className="flex items-center gap-2 px-4 py-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full text-xs font-bold hover:bg-blue-100 transition-all"
                                    >
                                        <Icon name="Download" size={14} /> 앱 설치
                                    </button>
                                )}
                                <button 
                                    onClick={() => setIsDarkMode(!isDarkMode)}
                                    className="p-2 bg-white dark:bg-slate-800 rounded-full shadow-sm border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 transition-theme"
                                >
                                    <Icon name={isDarkMode ? 'Sun' : 'Moon'} size={20} />
                                </button>
                                <button 
                                    onClick={fetchData} 
                                    disabled={loading}
                                    className="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 rounded-full shadow-sm text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 active:scale-95 transition-all border border-slate-200 dark:border-slate-700 transition-theme"
                                >
                                    <Icon name="RefreshCcw" size={16} className={loading ? "animate-spin" : ""} />
                                    <span className="hidden sm:inline-block ml-1">{loading ? '동기화 중...' : '새로고침'}</span>
                                </button>
                            </div>
                        </div>

                        {activeTab === 'Dashboard' ? (
                            <div className="space-y-6 animate-in">
                                <div className="bg-slate-900 dark:bg-blue-950 p-8 rounded-[2rem] text-white shadow-2xl relative overflow-hidden transition-theme">
                                    <div className="relative z-10">
                                        <div className="flex items-center gap-2 mb-2">
                                            <Icon name="Activity" size={14} className="text-blue-400" />
                                            <h3 className="text-slate-400 text-sm font-medium uppercase tracking-widest">Total Net Worth</h3>
                                        </div>
                                        <p className="text-4xl md:text-5xl font-bold tracking-tight">{formatKRW(stats.grandTotal)}</p>
                                        <div className="mt-8 flex flex-wrap gap-4">
                                            {Object.entries(stats.totals).map(([key, val]) => (
                                                <div 
                                                    key={key} 
                                                    onClick={() => setActiveTab(key)}
                                                    className="bg-white/5 border border-white/10 px-5 py-3 rounded-2xl backdrop-blur-sm flex items-center gap-3 min-w-[140px] cursor-pointer hover:bg-white/20 hover:scale-105 transition-all duration-300 group"
                                                >
                                                    <Icon name={getAssetIcon(key)} size={16} className="text-blue-400 group-hover:text-blue-300" />
                                                    <div>
                                                        <span className="text-[11px] text-slate-400 block uppercase font-bold">{key}</span>
                                                        <span className="text-base font-bold">{formatKRW(val)}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="absolute -bottom-12 -right-12 text-white/5 transform -rotate-12">
                                        <Icon name="PieChart" size={240} />
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-8">
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm transition-theme">
                                        <h3 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase mb-6 flex items-center gap-2">
                                            <Icon name="BarChart3" size={16} /> 월별 자산 증감 현황
                                        </h3>
                                        <div className="h-48 flex items-end justify-between gap-2 px-2">
                                            {[45, 60, 55, 75, 85, 100].map((h, i) => (
                                                <div key={i} className="flex-1 flex flex-col items-center gap-2">
                                                    <div 
                                                        className="w-full bg-blue-100 dark:bg-blue-900/40 rounded-t-lg relative group overflow-hidden"
                                                        style={{ height: `${h}%` }}
                                                    >
                                                        <div className="absolute inset-x-0 bottom-0 bg-blue-600 rounded-t-lg transition-all duration-1000 h-0 group-hover:h-full"></div>
                                                        <div className="bg-blue-500 w-full h-full rounded-t-lg opacity-80"></div>
                                                    </div>
                                                    <span className="text-[10px] text-slate-400 font-bold">{i + 7}월</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm flex flex-col transition-theme">
                                        <h3 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase mb-6 flex items-center gap-2">
                                            <Icon name="PieChart" size={16} /> 자산 영역별 비중
                                        </h3>
                                        <div className="flex-1 flex items-center justify-around">
                                            <div 
                                                className="relative w-36 h-36 rounded-full flex items-center justify-center transition-all duration-700 shadow-lg"
                                                style={{ background: getChartGradient() }}
                                            >
                                                <div className="w-[70%] h-[70%] rounded-full bg-white dark:bg-slate-800 flex items-center justify-center shadow-inner transition-theme">
                                                    <span className="text-[10px] font-bold text-slate-400 text-center uppercase leading-tight px-2">Portfolio<br/>Mix</span>
                                                </div>
                                            </div>
                                            
                                            <div className="space-y-2">
                                                {Object.entries(stats.totals).map(([key, val], i) => {
                                                    const percent = Math.round((val / (stats.grandTotal || 1)) * 100);
                                                    return (
                                                        <div key={key} className="flex items-center gap-3">
                                                            <div className="w-2.5 h-2.5 rounded-full shadow-sm" style={{ backgroundColor: assetColors[key] }}></div>
                                                            <span className="text-[11px] font-medium text-slate-500 dark:text-slate-400 w-20">{key}</span>
                                                            <span className="text-[11px] font-bold text-slate-700 dark:text-slate-200">{percent}%</span>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            renderDetailView(activeTab)
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 px-6 py-3 flex justify-between items-center md:hidden z-40 transition-theme">
                        {menuItems.slice(0, 4).map(item => (
                            <button 
                                key={item.id} 
                                onClick={() => setActiveTab(item.id)}
                                className={`p-2 rounded-xl transition-all ${activeTab === item.id ? 'text-blue-600 bg-blue-50 dark:bg-blue-900/30' : 'text-slate-400'}`}
                            >
                                <Icon name={item.icon} size={24} />
                            </button>
                        ))}
                        <button 
                            onClick={() => {
                                if (activeTab !== 'Dashboard') {
                                    openEditModal(activeTab);
                                } else {
                                    setActiveTab('입출금');
                                }
                            }}
                            className="p-3 bg-slate-900 dark:bg-blue-600 text-white rounded-full shadow-lg transform -translate-y-4 border-4 border-slate-50 dark:border-slate-950 transition-all"
                        >
                            <Icon name="PlusCircle" size={24} />
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
